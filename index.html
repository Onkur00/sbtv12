<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live TV Player | Remote Up/Down Direct</title>
    <script>
      // Inline polyfill for globalThis (crucial for older Smart TVs that lack globalThis)
      if (typeof globalThis === 'undefined') {
        (function() {
          if (typeof self !== 'undefined') {
            self.globalThis = self;
          } else if (typeof window !== 'undefined') {
            window.globalThis = window;
          } else if (typeof global !== 'undefined') {
            global.globalThis = global;
          } else {
            this.globalThis = this;
          }
        })();
      }

      // Handle uncaught exceptions gracefully on older browsers
      window.addEventListener('error', function(e) {
        console.error('⚡ Global system crash detected:', e.message, 'at', e.filename, ':', e.lineno);
        var rootEl = document.getElementById('root');
        if (rootEl && (!rootEl.innerHTML || rootEl.innerHTML.trim() === "")) {
          rootEl.innerHTML = '<div style="padding: 40px; text-align: center; font-family: sans-serif; background: #0f172a; color: #f8fafc; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;">' +
            '<h1 style="font-size: 24px; color: #ef4444; margin-bottom: 16px;">System Compatibility Check</h1>' +
            '<p style="font-size: 14px; color: #94a3b8; max-width: 500px; margin-bottom: 24px;">Your browser is using an older engine. The system is attempting to optimize and load fallback channels. Please wait...</p>' +
            '<div style="width: 40px; height: 40px; border: 4px solid #334155; border-top-color: #3b82f6; border-radius: 50%; animate: spin 1s linear infinite;"></div>' +
            '</div>';
          
          // Try loading alternate non-module entry point if possible after delay
          setTimeout(function() {
            var script = document.createElement('script');
            script.src = '/assets/index-legacy.js'; // fallback script generated by build pipeline
            document.body.appendChild(script);
          }, 2000);
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
